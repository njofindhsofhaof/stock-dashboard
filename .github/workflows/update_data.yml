name: Update Stock Data

on:
  schedule:
    # Chạy mỗi 15 phút, từ 14:00-21:00 UTC (= 9:00 AM - 4:00 PM ET)
    # Ngày thứ 2 đến thứ 6
    - cron: '*/15 14-20 * * 1-5'
    # Chạy thêm lúc 13:45 UTC (= 9:45 AM ET) để bắt đầu phiên
    - cron: '45 13 * * 1-5'
    # Chạy lúc đóng cửa 21:05 UTC (= 4:05 PM ET)
    - cron: '5 21 * * 1-5'

  # Cho phép chạy thủ công từ tab Actions trên GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch stock data
        run: python fetch_data.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_data.json
          git diff --staged --quiet || git commit -m "📊 $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
